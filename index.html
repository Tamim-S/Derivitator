<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><u>DERIVITATOR</u></title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: white;
      padding: 40px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 40px;
      font-size: 18px;
    }

    .panel {
      background-color: #1e293b;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 30px;
    }

    .panel h2 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    .input-row {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      min-width: 250px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #475569;
      background-color: #334155;
      color: white;
      font-size: 18px;
    }

    button {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      background-color: #2563eb;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background-color: #3b82f6;
    }

    .output-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .math-box {
      background-color: #334155;
      padding: 20px;
      border-radius: 14px;
      font-size: 24px;
      font-family: monospace;
      min-height: 60px;
      display: flex;
      align-items: center;
    }

    @media (max-width: 700px) {
      .output-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Derivitator</h1>
    <div class="subtitle">
      Interactive differentiation tool.
    </div>

    <div class="panel">
      <h2>Function Input</h2>

      <div class="input-row">
        <input type="text" placeholder="Enter function, e.g. sin(x^2)">
        <button>Differentiate</button>
      </div>
    </div>

    <div class="output-grid">
      <div class="panel">
        <h2>Original Function</h2>

        <div class="math-box">
          f(x) = x^2
        </div>
      </div>

      <div class="panel">
        <h2>Derivative Function</h2>

        <div class="math-box">
          f'(x) = 2x
        </div>
      </div>
    </div>
  </div>
</body>
</html>
